# Cargo-deny configuration for license, advisory, and ban checking
# See: https://embarkstudios.github.io/cargo-deny/

[licenses]
# List of allowed licenses for dependencies
# Include common OSI-approved licenses used by Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-DFS-2016",
    "BSD-2-Clause",           # Used by comrak and other common crates
    "BSD-3-Clause",           # Common BSD license
    "MPL-2.0",                # Mozilla Public License, used by cssparser
    "ISC",                    # ISC license, similar to MIT
    "CC0-1.0",                # Public domain dedication
]

# Optional: Deny specific licenses if needed
# deny = ["GPL-3.0"]

# Optional: Allow deprecated license identifiers
# allow-osi-fsf-free = "both"

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"

# The graph highlighting used when creating dotgraphs for crates with multiple versions
# Options: "lowest-version", "simplest-path", "all"
highlight = "all"

# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []

# Similarly to `skip` allows you to skip certain crates during duplicate detection, unlike skip, it also includes the entire tree of transitive dependencies starting at the specified crate, up to a certain depth, which is by default infinite
skip-tree = []

[advisories]
# List of advisory IDs to ignore
# Note: Only ignore advisories after careful consideration
ignore = [
    # Unmaintained crates that are still functional and have no secure alternatives
    # These should be reviewed periodically for maintained alternatives
    "RUSTSEC-2024-0436",  # paste - still functional, widely used
    "RUSTSEC-2025-0119",  # number_prefix - used transitively, still functional
    "RUSTSEC-2024-0320",  # yaml-rust - used transitively, still functional
    "RUSTSEC-2024-0384",  # fxhash - used transitively, still functional
    "RUSTSEC-2025-0067",  # libyml - transitive dep via metadata-gen/rlg, no direct replacement
    "RUSTSEC-2025-0068",  # serde_yml - transitive dep via metadata-gen/rlg, no direct replacement
]

# Advisory database configuration
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

# What to do when advisories are encountered
vulnerability = "deny"
unmaintained = "deny"
unsound = "deny"
yanked = "deny"

[sources]
# Lint level for what to do when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
# Lint level for what to do when a crate from a registry that is not in the
# allow list is encountered
unknown-registry = "warn"

# List of allowed registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# List of allowed Git repositories
allow-git = []