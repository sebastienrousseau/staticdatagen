# Cargo-deny configuration for license, advisory, and ban checking
# See: https://embarkstudios.github.io/cargo-deny/

[licenses]
# List of allowed licenses for dependencies
# Include common OSI-approved licenses used by Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-DFS-2016",
    "BSD-2-Clause",           # Used by comrak and other common crates
    "BSD-3-Clause",           # Common BSD license
    "MPL-2.0",                # Mozilla Public License, used by cssparser
    "ISC",                    # ISC license, similar to MIT
    "CC0-1.0",                # Public domain dedication
]

# Optional: Deny specific licenses if needed
# deny = ["GPL-3.0"]

# Optional: Allow deprecated license identifiers
# allow-osi-fsf-free = "both"

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"

# The graph highlighting used when creating dotgraphs for crates with multiple versions
# Options: "lowest-version", "simplest-path", "all"
highlight = "all"

# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []

# Similarly to `skip` allows you to skip certain crates during duplicate detection, unlike skip, it also includes the entire tree of transitive dependencies starting at the specified crate, up to a certain depth, which is by default infinite
skip-tree = []

[advisories]
# List of advisory IDs to ignore
# Note: Only ignore advisories after careful consideration
#
# QUARTERLY REVIEW SCHEDULE:
# Last reviewed: 2026-02-16
# Next review:   2026-05-16
#
# Review checklist:
#   1. Run `cargo audit` to check for new advisories
#   2. Check each ignored advisory for maintained alternatives
#   3. Update comments with findings and next review date
#   4. Remove entries where replacements are available
ignore = [
    # [Reviewed 2026-02-16] Unmaintained but functional, no drop-in replacement
    "RUSTSEC-2024-0436",  # paste - still functional, widely used, no alternative
    # [Reviewed 2026-02-16] Transitive via indicatif/rlg, no action possible
    "RUSTSEC-2025-0119",  # number_prefix - transitive dep, still functional
    # [Reviewed 2026-02-16] Transitive via config/rlg, yaml-rust2 exists but not a drop-in
    "RUSTSEC-2024-0320",  # yaml-rust - transitive dep, still functional
    # [Reviewed 2026-02-16] Transitive via whatlang, no action possible
    "RUSTSEC-2024-0384",  # fxhash - transitive dep, still functional
    # [Reviewed 2026-02-16] Transitive via metadata-gen/rlg, upstream needs to migrate
    "RUSTSEC-2025-0067",  # libyml - transitive dep, no direct replacement available
    # [Reviewed 2026-02-16] Transitive via metadata-gen/rlg, upstream needs to migrate
    "RUSTSEC-2025-0068",  # serde_yml - transitive dep, no direct replacement available
]

# Use v2 configuration (vulnerability/unmaintained/unsound/yanked are deny by default)
version = 2

# Advisory database configuration
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]

[sources]
# Lint level for what to do when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "warn"
# Lint level for what to do when a crate from a registry that is not in the
# allow list is encountered
unknown-registry = "warn"

# List of allowed registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# List of allowed Git repositories
allow-git = []