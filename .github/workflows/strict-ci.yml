name: 🔒 Strict CI Pipeline

# Enforce strict CI pipeline for Rust projects
# - cargo clippy with -D warnings (deny all warnings)
# - cargo fmt -- --check (fail on unformatted code)
# - cargo test with --all-features and --no-default-features
# - MSRV verification (install and test against declared rust-version)
# - cargo doc --no-deps -D warnings (deny doc warnings)
# - cargo deny check (licenses, advisories, bans)
# - RUSTFLAGS='-D warnings' globally
# - cargo-semver-checks before releases
# - Enforce #![deny(missing_docs)] on library crates
# - Miri for unsafe code validation
# - CI matrix: macOS + Linux at minimum
# - Cache target/ directory
# - Nightly job for beta/nightly compiler testing
# - No '|| true' on any step

on:
  push:
    branches: [main, develop, "feat/*"]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly to catch compiler regressions
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  # Global RUSTFLAGS to deny all warnings
  RUSTFLAGS: '-D warnings'
  # Enforce missing docs denial for library crates
  RUSTDOCFLAGS: '-D warnings -D missing_docs'

jobs:
  # Job 1: Format Check
  format-check:
    name: 📝 Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # Job 2: Clippy Linting (deny all warnings)
  clippy-check:
    name: 📎 Clippy Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Run clippy with denial of all warnings
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  # Job 3: Documentation Check
  docs-check:
    name: 📖 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-
            ${{ runner.os }}-cargo-

      - name: Check documentation build with warnings denied
        run: cargo doc --workspace --no-deps --all-features

      - name: Verify missing_docs lint is enforced in library crates
        run: |
          # Check that lib.rs contains #![deny(missing_docs)] or equivalent
          if ! grep -r "#!\[.*deny.*missing_docs\]" src/lib.rs; then
            echo "ERROR: Library crate must enforce #![deny(missing_docs)]"
            echo "Add '#![deny(missing_docs)]' to src/lib.rs"
            exit 1
          fi

  # Job 4: Security and License Audit
  security-audit:
    name: 🛡️ Security & License Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo deny check
        run: cargo deny check

  # Job 5: MSRV Verification
  msrv-check:
    name: 🏗️ MSRV Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(grep '^rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "msrv=$MSRV" >> $GITHUB_OUTPUT
          echo "Detected MSRV: $MSRV"

      - name: Setup Rust MSRV
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-msrv-${{ steps.msrv.outputs.msrv }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-${{ steps.msrv.outputs.msrv }}-
            ${{ runner.os }}-cargo-msrv-

      - name: Check compilation with MSRV
        run: cargo check --workspace --all-features

      - name: Run tests with MSRV
        run: cargo test --workspace --all-features

  # Job 6: Cross-Platform Testing
  test-matrix:
    name: 🧪 Test Matrix
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust-version: [stable]
        features: [
          "--all-features",
          "--no-default-features",
          "--no-default-features --features minimal"
        ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust ${{ matrix.rust-version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust-version }}

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.os }}-cargo-test-${{ matrix.rust-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-test-${{ matrix.rust-version }}-
            ${{ matrix.os }}-cargo-test-

      - name: Run tests with ${{ matrix.features }}
        run: cargo test --workspace ${{ matrix.features }}

  # Job 7: Miri Testing for Unsafe Code
  miri-check:
    name: 🔮 Miri Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-miri-
            ${{ runner.os }}-cargo-

      - name: Setup miri
        run: cargo miri setup

      - name: Check for unsafe code
        id: unsafe-check
        run: |
          if grep -r "unsafe " src/; then
            echo "unsafe_found=true" >> $GITHUB_OUTPUT
            echo "Unsafe code detected, running miri tests"
          else
            echo "unsafe_found=false" >> $GITHUB_OUTPUT
            echo "No unsafe code found, skipping miri tests"
          fi

      - name: Run miri tests (if unsafe code exists)
        if: steps.unsafe-check.outputs.unsafe_found == 'true'
        run: cargo miri test

      - name: Log miri skip reason
        if: steps.unsafe-check.outputs.unsafe_found == 'false'
        run: echo "Miri testing skipped - no unsafe code detected"

  # Job 8: Nightly Compiler Testing
  nightly-test:
    name: 🌙 Nightly Compiler Test
    runs-on: ubuntu-latest
    # Allow nightly to fail without breaking the build
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-

      - name: Test with nightly compiler
        run: |
          echo "Testing with Rust nightly"
          cargo test --workspace --all-features

  # Job 9: Semver Compatibility Check (for releases)
  semver-check:
    name: 📋 Semver Compatibility
    runs-on: ubuntu-latest
    # Only run on release-related events
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Need full history for semver checks
          fetch-depth: 0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-semver-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-semver-
            ${{ runner.os }}-cargo-

      - name: Check semver compatibility
        run: cargo semver-checks check-release

  # Job 10: Comprehensive Check Job (required for branch protection)
  strict-ci-complete:
    name: ✅ Strict CI Complete
    runs-on: ubuntu-latest
    needs: [
      format-check,
      clippy-check,
      docs-check,
      security-audit,
      msrv-check,
      test-matrix,
      miri-check
    ]
    steps:
      - name: All checks passed
        run: |
          echo "🎉 All strict CI checks have passed successfully!"
          echo "✅ Format check: PASSED"
          echo "✅ Clippy linting: PASSED"
          echo "✅ Documentation: PASSED"
          echo "✅ Security audit: PASSED"
          echo "✅ MSRV verification: PASSED"
          echo "✅ Cross-platform tests: PASSED"
          echo "✅ Miri validation: PASSED"