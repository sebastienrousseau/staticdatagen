name: CI
on:
  push:
    branches: [main, feat/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# No caller-level `permissions:` block. A workflow-level block would
# cap the ceiling for every reusable workflow we call, and `docs.yml`'s
# `deploy` job requests `pages: write` + `id-token: write` (for GitHub
# Pages OIDC). A restrictive ceiling here fails the workflow at
# startup with "The nested job 'deploy' is requesting 'pages: write,
# id-token: write', but is only allowed 'pages: none, id-token: none'".
# Each reusable workflow declares its own job-level permissions, which
# is the correct boundary.

jobs:
  # ── Primary: stable, all checks, cross-platform ──────────────────
  # `run-audit: false` because the reusable workflow's audit job only
  # grants `contents: read`, leaving `rustsec/audit-check` unable to
  # POST its check-run summary ("Resource not accessible by
  # integration"). The local `audit` job below runs the same action
  # with the `checks: write` permission it actually needs.
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-audit: false
      run-coverage: true
      run-cross-platform: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Audit: run inline with `checks: write` (the upstream reusable
  # workflow only grants `contents: read`, which makes the
  # `rustsec/audit-check` action fail when it tries to POST a
  # check-run summary). Reads `.cargo/audit.toml` for the ignore list.
  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false
          show-progress: false
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── MSRV: minimum supported Rust version ─────────────────────────
  msrv:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: '1.88.0'
      run-fmt: false
      run-clippy: false
      run-audit: false
      run-coverage: false
      run-cross-platform: false

  # ── Nightly: catch upcoming breakage early ────────────────────────
  nightly:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'nightly'
      run-fmt: false
      run-clippy: false
      run-audit: false
      run-coverage: false
      run-cross-platform: false

  # ── Security: audit, deny, CodeQL, dependency review ──────────────
  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@main
    with:
      language: rust
      allow-ghsas: GHSA-2m76-cwhg-7wv6, GHSA-gfxp-f68g-8x78, GHSA-hhw4-xg65-fp2x

  # ── Miri: detect undefined behaviour ──────────────────────────────
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo miri test models -- --skip proptest
          cargo miri test utilities::element
          cargo miri test utilities::uuid
          cargo miri test locales
          cargo miri test macros::directory
          cargo miri test macros::custom
        env:
          MIRIFLAGS: -Zmiri-disable-isolation -Zmiri-tree-borrows

  # ── Semver: prevent accidental breaking changes ───────────────────
  semver:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  # ── Docs: build and deploy to GitHub Pages ────────────────────────
  docs:
    if: github.ref == 'refs/heads/main'
    uses: sebastienrousseau/pipelines/.github/workflows/docs.yml@main
    with:
      type: rust
      redirect-crate: staticdatagen
