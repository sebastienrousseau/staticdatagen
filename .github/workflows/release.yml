name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  # ── Gate: full CI must pass before release ────────────────────────
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-coverage: false
      run-cross-platform: true

  # ── Release: cross-compile, publish, SBOM ─────────────────────────
  release:
    needs: ci
    uses: sebastienrousseau/pipelines/.github/workflows/release.yml@main
    with:
      language: rust
      rust-targets: '["x86_64-unknown-linux-gnu","aarch64-unknown-linux-gnu","x86_64-unknown-linux-musl","x86_64-apple-darwin","aarch64-apple-darwin","x86_64-pc-windows-msvc"]'
    secrets:
      CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
