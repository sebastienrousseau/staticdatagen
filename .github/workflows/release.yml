name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  # ── Gate: full CI must pass before release ────────────────────────
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-coverage: false
      run-cross-platform: true

  # ── Release: cross-compile, publish, SBOM ─────────────────────────
  # `rust-targets` MUST be a JSON-encoded array of `{target, os}`
  # objects — the reusable workflow's matrix accesses
  # `matrix.platform.target` and `matrix.platform.os`. Passing a bare
  # string array silently produces a matrix that expands to zero
  # valid jobs, so `build-rust` is skipped, `release-rust` (which
  # `needs: build-rust`) is skipped, and no GitHub Release is
  # published — this is exactly what happened on the v0.0.10 tag
  # (manually published with `gh release create v0.0.10`).
  release:
    needs: ci
    uses: sebastienrousseau/pipelines/.github/workflows/release.yml@main
    with:
      language: rust
      rust-targets: |
        [
          {"target":"x86_64-unknown-linux-gnu",  "os":"ubuntu-latest"},
          {"target":"aarch64-unknown-linux-gnu", "os":"ubuntu-latest"},
          {"target":"x86_64-unknown-linux-musl", "os":"ubuntu-latest"},
          {"target":"x86_64-apple-darwin",       "os":"macos-latest"},
          {"target":"aarch64-apple-darwin",      "os":"macos-latest"},
          {"target":"x86_64-pc-windows-msvc",    "os":"windows-latest"}
        ]
    secrets:
      CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
